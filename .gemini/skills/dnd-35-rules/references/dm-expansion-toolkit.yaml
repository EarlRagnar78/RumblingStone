  notes_on_using_the_orbitalflower_archive_for_maps: "The **Map-A-Week** series from\
    \ WotC produced hundreds of grid maps (dungeon rooms, wilderness,\nencounter sites)\
    \ in GIF/JPG format, ideal for VTT play.\n\n### Finding and Using a Map\n\n1.\
    \ Load https://orbitalflower.github.io/rpg/wizards-3e-archive.html\n2. Ctrl+F\
    \ for \"Map-A-Week\" — find the index section\n3. Click the original Wizards URL\
    \ → paste into Wayback Machine search:\n   `https://web.archive.org/web/*/[original-url]`\n\
    4. Select a 2003–2006 snapshot → download the GIF/JPG\n5. Import into Roll20 or\
    \ Owlbear Rodeo as the battle map\n6. Set grid to match (most WotC maps use 5-ft\
    \ squares at approximately 50 or 100px/square)\n\n### Recommended Map-A-Week archives\
    \ for Cannath Vale\n\nSearch these terms in the orbitalflower index:\n- \"swamp\"\
    \ → for Lhespenbog encounters\n- \"bridge\" → for Skull Gorge\n- \"fortress ruins\"\
    \ → for Vraath Keep\n- \"town\" → for Rethmar scenes\n- \"mountain pass\" → for\
    \ Nimon Gap\n- \"forest\" → for Shaarcah Forest encounters"
