  overview: '# Cannath Vale — Campaign Setting Reference'
  map_attribution: '**Map by**: Arne Haschen (<antariuk@gmail.com>)

    **Based on**: Elsir Vale map by Mike Schley, *Red Hand of Doom* (Jacobs & Wyatt,
    2006)

    **Tools**: Adobe Photoshop CS3; notebook; pencils

    **Source**: <https://cdna.artstation.com/p/assets/images/images/001/044/588/large/arne-haschen-red-hand-of-doom-cannath-vale-map-gm.jpg>

    **Parchment texture**: coyotemax.deviantart.com


    Two versions: **GM map** (shows Vraath Keep, Ghostlord''s Lair, Fane of Tiamat,
    Lhesper)

    and **Player map** (adventure sites hidden).


    All names below are extracted directly from the GM map image.


    ---'
  complete_map_label_extraction_(canonical,_image-verified): '### Geographic Regions


