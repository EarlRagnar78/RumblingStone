name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate skills & scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Python scripts compile
        run: python -m compileall -q scripts Script

      - name: Validate skill trees (frontmatter, links, data YAML)
        run: python scripts/validate_skills.py

  build:
    name: Build skill packages
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Build all per-agent skill packages
        run: ./scripts/build-skills.sh --no-deploy

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: skill-packages
          path: build/
          retention-days: 14
