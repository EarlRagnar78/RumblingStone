  dragon_pantheon: '**Io** (EE-oh) — Overgod of Dragonkind. Neutral. Created both
    Bahamut and Tiamat.


    **Bahamut** (bah-HAH-mut)

    AL: LG | Portfolio: Good dragons, wisdom, justice, wind

    Domains: Air, Good, Law, Luck, Protection

    Notes: Platinum Dragon. Five great wyrm gold dragons serve as advisors. Takes
    humanoid form often.


    **Tiamat** (TEE-ah-mat)

    AL: LE | Portfolio: Evil dragons, greed, wealth, queen of evil dragonkind

    Domains: Evil, Law, Scalykind, Tyranny

    Notes: Five-headed (chromatic). Imprisoned in Avernus (first layer of Baator).
    Has cult in Faerûn.


    Other dragon deities: **Aasterinian** (invention, pleasure, WN), **Chronepsis**
    (fate, death, N),

    **Faluzure** (undeath, shadow dragons, NE), **Garyx** (fire, destruction, CE),

    **Hlal** (humor, tricks, CG), **Lendys** (justice, law, LN), **Tamara** (life,
    light, NG)


    ---'
  notes_on_domain_assignment_(3.5): 'Domains grant 1 spell per spell level AND 1 granted
    power. Clerics get 2 domains.


    **Uncommon domains** (non-SRD, from FR sources):

    Cavern (Stoneshape 1/day / Darkvision), Craft (Repair damage), Drow (Clairaudience/Clairvoyance
    1/day),

    Dwarf (+4 Dodge vs. giants), Fate (Uncanny Dodge), Halfling (+1 attack 1/day),
    Metal (Rust resistance),

    Moon (Turn lycanthropes), Nobility (Leadership bonus feat), Ocean (Water breathing
    1/day),

    Orc (Blind-fight bonus feat), Planning (Extend Spell metamagic free 1/day), Portal
    (Dimension door 1/day),

    Renewal (Reborn on death once/day), Retribution (Smite 1/day), Scalykind (+2 save
    vs. reptile),

    Spell (Imbue with Spell Ability 1/day), Spider (Poison 1/day), Suffering (Pain
    touch 1/day),

    Time (Haste 1/day), Trade (1/day +4 Appraise/Bluff/Diplomacy/Forgery), Tyranny
    (Domination),

    Undeath (Rebuke/control undead), War (free Martial Weapon Proficiency + Weapon
    Focus for deity''s weapon)'
