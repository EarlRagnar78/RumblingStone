    | Large | −1 | +4 | −4 |

    | Huge | −2 | +8 | −8 |

    | Gargantuan | −4 | +12 | −12 |

    | Colossal | −8 | +16 | −16 |


    ---'
  skills_(complete_srd_list): '### Key Skill Rules

    - **Synergy:** +2 bonus when you have 5+ ranks in a synergistic skill (see each
    skill entry)

    - **Armor Check Penalty (ACP):** Applies to: Balance, Climb, Escape Artist, Hide,
    Jump, Move Silently, Sleight of Hand, Swim, Tumble

    - **Encumbrance** applies its own ACP on top of armor ACP for physical skills


    ### Core Skills (SRD)


    | Skill | Key Ability | Trained Only | Armor Check |

    |---|---|---|---|

    | Appraise | INT | No | No |

    | Balance | DEX | No | Yes |

    | Bluff | CHA | No | No |

    | Climb | STR | No | Yes |

    | Concentration | CON | No | No |

    | Craft (any) | INT | No | No |

    | Decipher Script | INT | Yes | No |

    | Diplomacy | CHA | No | No |

    | Disable Device | INT | Yes | No |

    | Disguise | CHA | No | No |

    | Escape Artist | DEX | No | Yes |

    | Forgery | INT | No | No |

    | Gather Information | CHA | No | No |

    | Handle Animal | CHA | Yes | No |

    | Heal | WIS | No | No |

    | Hide | DEX | No | Yes |

    | Intimidate | CHA | No | No |

    | Jump | STR | No | Yes |

    | Knowledge (all) | INT | Yes | No |

    | Listen | WIS | No | No |

    | Move Silently | DEX | No | Yes |

    | Open Lock | DEX | Yes | No |

    | Perform (any) | CHA | No | No |

    | Profession (any) | WIS | Yes | No |

