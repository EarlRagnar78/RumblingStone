<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" width="640" height="520" role="img" aria-label="Piazza del Palio di Channathgate — pista e zone di inseguimento">
  <rect width="640" height="520" fill="#efe7d3"/>
  <text x="320" y="30" font-family="Georgia,serif" font-size="20" text-anchor="middle" font-weight="bold" fill="#3a2f22">Piazza del Guado — Pista del Palio di Channathgate</text>
  <text x="320" y="50" font-family="Georgia,serif" font-size="12" text-anchor="middle" fill="#6b5a3a">Anello di pietra a conchiglia · 3 giri · senso orario · fondo cosparso di tufo (sabbia)</text>

  <!-- anello esterno pista -->
  <path d="M120 120 H520 Q580 120 580 200 V330 Q580 420 470 440 H180 Q60 420 60 320 V200 Q60 120 120 120 Z" fill="#c9a267" stroke="#5a4326" stroke-width="3"/>
  <!-- interno piazza (pubblico) -->
  <path d="M170 170 H470 Q520 170 520 230 V320 Q520 380 440 392 H200 Q120 380 120 300 V230 Q120 170 170 170 Z" fill="#d9cbA8" stroke="#8a7448" stroke-width="2"/>
  <text x="320" y="290" font-family="Georgia,serif" font-size="13" text-anchor="middle" fill="#6b5a3a">CATINO INTERNO</text>
  <text x="320" y="308" font-family="Georgia,serif" font-size="11" text-anchor="middle" fill="#6b5a3a">(folla · 6.000 anime · palchi delle contrade)</text>

  <!-- canapi / mossa -->
  <line x1="120" y1="120" x2="120" y2="170" stroke="#7a1f1f" stroke-width="4"/>
  <rect x="96" y="96" width="80" height="22" rx="3" fill="#7a1f1f"/>
  <text x="136" y="111" font-family="Georgia,serif" font-size="11" fill="#fff" text-anchor="middle">CANAPI / MOSSA</text>

  <!-- zone numerate -->
  <g font-family="Georgia,serif" font-size="12" fill="#2a1c0e" font-weight="bold">
    <circle cx="330" cy="120" r="14" fill="#f2efe6" stroke="#5a4326" stroke-width="2"/><text x="330" y="125" text-anchor="middle">1</text>
    <circle cx="560" cy="180" r="14" fill="#f2efe6" stroke="#5a4326" stroke-width="2"/><text x="560" y="185" text-anchor="middle">2</text>
    <circle cx="558" cy="360" r="14" fill="#f2efe6" stroke="#5a4326" stroke-width="2"/><text x="558" y="365" text-anchor="middle">3</text>
    <circle cx="330" cy="452" r="14" fill="#f2efe6" stroke="#5a4326" stroke-width="2"/><text x="330" y="457" text-anchor="middle">4</text>
    <circle cx="80" cy="360" r="14" fill="#f2efe6" stroke="#5a4326" stroke-width="2"/><text x="80" y="365" text-anchor="middle">5</text>
    <circle cx="82" cy="180" r="14" fill="#f2efe6" stroke="#5a4326" stroke-width="2"/><text x="82" y="185" text-anchor="middle">6</text>
  </g>

  <!-- curve pericolose -->
  <g font-family="Georgia,serif" font-size="10.5" fill="#7a1f1f" font-weight="bold">
    <rect x="500" y="120" width="130" height="18" fill="#f5e9e0" opacity="0.9"/><text x="565" y="133" text-anchor="middle">Curva del Mercante ▸ DC 22</text>
    <rect x="500" y="392" width="140" height="18" fill="#f5e9e0" opacity="0.9"/><text x="570" y="405" text-anchor="middle">Curva del Guado ▸ DC 24 (fango)</text>
    <rect x="10" y="392" width="150" height="18" fill="#f5e9e0" opacity="0.9"/><text x="85" y="405" text-anchor="middle">Curva del Boia ▸ DC 24 (muro cieco)</text>
    <rect x="10" y="120" width="130" height="18" fill="#f5e9e0" opacity="0.9"/><text x="75" y="133" text-anchor="middle">Curva dell'Alba ▸ DC 20</text>
  </g>

  <!-- Palco del Sindaco/Gonfaloniere e Palio -->
  <rect x="284" y="150" width="72" height="20" fill="#0d1b2a"/>
  <text x="320" y="164" font-family="Georgia,serif" font-size="10" fill="#e9c24a" text-anchor="middle">PALCO DEL GONFALONIERE</text>
  <text x="320" y="184" font-family="Georgia,serif" font-size="10" fill="#7a1f1f" text-anchor="middle">▲ il Drappellone è esposto qui</text>

  <!-- legenda -->
  <g font-family="Georgia,serif" font-size="11" fill="#3a2f22">
    <text x="30" y="480" font-weight="bold">Zone (Chase):</text>
    <text x="30" y="496">1 Rettilineo dei Banchi · 2 Curva del Mercante · 3 Curva del Guado · 4 Rettilineo del Popolo · 5 Curva del Boia · 6 Curva dell'Alba</text>
    <text x="30" y="512" fill="#7a1f1f">Nerbate legali in tutte le zone · Curve DC più alta = rischio caduta/disarcionamento · fondo di tufo = -2 se piove</text>
  </g>
</svg>
