    | **The Dawn Way** | Road (red) | Goes east past Rethmar toward Cannathgate |


    ### Settlements — Squares (Major Locations / Adventure Sites)


    | Name on Map | = RHoD Original | Role | Notes |

    |---|---|---|---|

    | **Lhesper** | Rhest | Ruined flooded city | N of Lake Lhespen; in Lhespenbog;
    Wyrmlord Koth''s base |

    | **Kormul** | *(Khormul — present and destroyed by Red Hand Army!)* | Town |
    Center-west; **IS on map** despite some sources saying removed |

    | **Skull Gorge** | Skull Gorge Bridge | Adventure site | On The Lhescreek; bridge
    destruction Chapter 1 climax |

    | **Vraath Keep** | Vraath Keep | Ruined keep | SW of Skull Gorge; name **retained**
    |

    | **Fane of Tiamat** | Fane of Tiamat | Temple | Far west in Wyrmbones; name **retained**;
    final dungeon |

    | **Drellin''s Ferry** | Drellin''s Ferry | River crossing town | On Old North
    Road; name **retained**; Chapter 1 opener |

    | **Hammerfist Holds** | Hammerfist Holds | Dwarven clanholds | South-center in
    The North Wall; name **retained** |

    | **Ghostlord''s Lair** | Ghostlord''s Lair | Lair / dungeon | South in Bandit
