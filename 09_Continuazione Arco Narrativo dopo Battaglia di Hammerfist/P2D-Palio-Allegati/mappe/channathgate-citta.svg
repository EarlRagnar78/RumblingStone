<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 560" width="640" height="560" role="img" aria-label="Channathgate — i rioni delle otto contrade">
  <rect width="640" height="560" fill="#e9edf0"/>
  <text x="320" y="30" font-family="Georgia,serif" font-size="20" text-anchor="middle" font-weight="bold" fill="#22303f">Channathgate — Città-Porto sul Fiume Cannath</text>
  <text x="320" y="48" font-family="Georgia,serif" font-size="12" text-anchor="middle" fill="#4a5a6a">Metropoli mercantile · ~35 miglia a est di Rethmar · gli 8 rioni delle contrade</text>

  <!-- fiume -->
  <path d="M0 470 q160 -30 320 -10 q160 20 320 -20 V560 H0 Z" fill="#3a91bd"/>
  <path d="M0 470 q160 -30 320 -10 q160 20 320 -20" fill="none" stroke="#1f6f8a" stroke-width="3"/>
  <text x="120" y="520" font-family="Georgia,serif" font-size="13" fill="#eef6fb" font-style="italic">Fiume Cannath ▸ verso Rethmar (SO)</text>

  <!-- mura -->
  <rect x="70" y="80" width="500" height="380" rx="26" fill="none" stroke="#5a4a3a" stroke-width="6" stroke-dasharray="2 0"/>
  <!-- porte -->
  <rect x="300" y="74" width="40" height="12" fill="#5a4a3a"/><text x="320" y="70" font-family="Georgia,serif" font-size="10" text-anchor="middle" fill="#5a4a3a">Porta dell'Alba (Dawn Way)</text>
  <rect x="64" y="250" width="12" height="40" fill="#5a4a3a"/>
  <rect x="300" y="454" width="40" height="12" fill="#5a4a3a"/><text x="360" y="466" font-family="Georgia,serif" font-size="10" text-anchor="middle" fill="#1f6f8a">Porta del Porto</text>

  <!-- Piazza centrale -->
  <ellipse cx="320" cy="270" rx="70" ry="52" fill="#c9a267" stroke="#5a4326" stroke-width="3"/>
  <text x="320" y="266" font-family="Georgia,serif" font-size="11" text-anchor="middle" font-weight="bold" fill="#3a2f22">PIAZZA</text>
  <text x="320" y="280" font-family="Georgia,serif" font-size="11" text-anchor="middle" font-weight="bold" fill="#3a2f22">DEL GUADO</text>
  <text x="320" y="296" font-family="Georgia,serif" font-size="9" text-anchor="middle" fill="#6b5a3a">(la pista)</text>

  <!-- rioni contrade -->
  <g font-family="Georgia,serif" font-size="12" font-weight="bold" text-anchor="middle">
    <g><rect x="110" y="110" width="120" height="70" rx="8" fill="#1f7a44" opacity="0.85"/><text x="170" y="150" fill="#fff">OCA</text><text x="170" y="166" fill="#eafff0" font-size="9" font-weight="normal">nobili/banchieri</text></g>
    <g><rect x="410" y="110" width="120" height="70" rx="8" fill="#8a1f2b" opacity="0.9"/><text x="470" y="150" fill="#fff">TORRE</text><text x="470" y="166" fill="#ffe8ea" font-size="9" font-weight="normal">veterani/fabbri</text></g>
    <g><rect x="410" y="200" width="120" height="60" rx="8" fill="#8a2f5f" opacity="0.9"/><text x="470" y="234" fill="#fff">DRAGO</text><text x="470" y="250" fill="#ffe6f2" font-size="9" font-weight="normal">accademia arcana</text></g>
    <g><rect x="410" y="300" width="120" height="66" rx="8" fill="#141414" opacity="0.9"/><text x="470" y="336" fill="#c9a227">CIVETTA</text><text x="470" y="352" fill="#e8dfc7" font-size="9" font-weight="normal">nobiltà decaduta</text></g>
    <g><rect x="110" y="200" width="120" height="60" rx="8" fill="#2a6fb0" opacity="0.9"/><text x="170" y="234" fill="#fff">UNICORNO</text><text x="170" y="250" fill="#e6f0ff" font-size="9" font-weight="normal">artigiani/gilde</text></g>
    <g><rect x="110" y="300" width="120" height="66" rx="8" fill="#b8a80f" opacity="0.9"/><text x="170" y="336" fill="#1a1a00">BRUCO</text><text x="170" y="352" fill="#2a2a00" font-size="9" font-weight="normal">mercato nero</text></g>
    <g><rect x="235" y="360" width="120" height="60" rx="8" fill="#6b4a1f" opacity="0.9"/><text x="295" y="394" fill="#fff">ISTRICE</text><text x="295" y="410" fill="#f0e2cf" font-size="9" font-weight="normal">profughi/sobborghi</text></g>
    <g><rect x="360" y="392" width="120" height="56" rx="8" fill="#1f6f8a" opacity="0.92"/><text x="420" y="422" fill="#fff">ONDA</text><text x="420" y="438" fill="#dff2fb" font-size="9" font-weight="normal">barcaioli/porto</text></g>
  </g>

  <!-- porto -->
  <g><rect x="470" y="454" width="90" height="30" rx="4" fill="#0d3a4a"/><text x="515" y="474" font-family="Georgia,serif" font-size="10" fill="#bfe6f5" text-anchor="middle">DARSENA / FLOTTA</text></g>

  <g font-family="Georgia,serif" font-size="10.5" fill="#22303f">
    <text x="30" y="546">Rivalità di rione: Oca↔Torre · Bruco↔Civetta · Drago↔Civetta · Istrice↔Oca · Unicorno = ago della bilancia · Onda = contrada di casa (host)</text>
  </g>
</svg>
