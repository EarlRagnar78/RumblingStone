skill: unknown
description: ''
sections:
  overview: '# Forgotten Realms — Prestige Classes (D&D 3.5)


    Sources: FRCS (2001), Player''s Guide to Faerûn (2004), Champions of Valor (2005),

    Champions of Ruin (2005), Races of Faerûn (2003), various FR splatbooks.


    Format: Requirements → Key features → Notes


    ---'
  frcs_core_prestige_classes: '### Arcane Devotee

    Requirements: Knowledge (religion) 4 ranks; ability to cast 2nd-level arcane spells

    HD: d4 | BAB: ½ | Saves: Will good

    Key features: Bonus domain spell (arcane version), Sacred Defense +2 per 2 levels,
    spellcasting +1/level

    Spellcasting: +1 arcane caster level per level (advances existing class)

    Notes: Allows arcane casters to serve a deity and gain domain access.


    ### Arcane Trickster (SRD + FR variant)

    Requirements: Sneak Attack +2d6; ability to cast mage hand; arcane caster

    HD: d4 | Key features: Ranged legerdemain, sneak attack advances, spellcasting
    advances


    ### Church Inquisitor

    Requirements: BAB +4; must worship a lawful deity; Knowledge (religion) 6 ranks

    HD: d8 | BAB: Full | Good saves: Fort, Will

    Key features: Detect Deception (as zone of truth continuously), Inquisitor''s
    Domain,

    Spellcasting +1/level (divine), Pierce Illusion, Find Heretic, Destructive Smite

    Notes: Detective/interrogator for lawful religions. Popular in Torm and Tyr churches.


    ### Divine Champion

    Requirements: BAB +7; must have a patron deity; Knowledge (religion) 4 ranks

    HD: d10 | BAB: Full | Good save: Fort

    Key features: Divine Wrath (Smite 1/day per 2 levels), Lay on Hands (CHA × lvl
    HP),

    Sacred Defense +1 per 2 levels, Martyr''s Death (on death, affect area as per
    spell)

    Notes: Holy warrior tied to a deity. Fighter/paladin path.


    ### Divine Disciple

    Requirements: Cleric or Druid; Knowledge (religion) 9 ranks; Spellcraft 4 ranks

    HD: d8 | BAB: ¾ | Good saves: Fort, Will

    Key features: 1 domain power/level from chosen deity, spellcasting +1/level,

    Transcendence (become outsider of appropriate subtype at level 5)

    Notes: Clerics who undergo profound transformation. Rare and powerful.


    ### Divine Seeker

    Requirements: Sneak attack +3d6; Knowledge (religion) 4 ranks; Gather Information
    8 ranks

    HD: d6 | BAB: ¾ | Good saves: Ref, Will

    Key features: Sacred Defense, sneak attack +1d6/2 levels, Locate Target (divine
    Locate Object),

    Woodland Stride, spellcasting +1/level (divine)

    Notes: Divine scout/spy. Popular with Mask and Waukeen churches.


    ### Harper Agent (Harper Scout)

    Requirements: Bard 1 or Ranger 2; Knowledge (local) 4 ranks; Knowledge (geography)
    2 ranks;

    Must be sponsored by a Harper member

    HD: d6 | BAB: ¾ | Good saves: Ref, Will

    Key features: Bard Song (gains bardic music uses even if not bard), Arcane Spellcasting
    (1st-3rd

    level bard spells), Woodland Stride, Nature''s Speech (Speak with Animals 1/day),

    Uncanny Dodge, Harper Knowledge (as Bardic Knowledge for local lore)

    Alignment: Any good or neutral

    Notes: The Harpers'' agents. Works well for charismatic ranger/bard hybrid builds.


    ### Hierophant (SRD)

    Requirements: Cleric 7+ or Druid 7+; Knowledge (religion) 15 ranks

    HD: d8 | Key features: Special abilities replacing spell slots (Blast Infidel,
    Summon Planar Ally,

    Faith Healing, Mastery of Energy, Power of Nature)


    ### Purple Dragon Knight

    Requirements: BAB +4; Diplomacy 4 ranks; must be Cormyrean military (or equivalent)

    HD: d10 | BAB: Full | Good save: Fort

    Key features: Rallying Cry (Inspire Courage as bard), Inspire Courage/Heroics/Greatness
    (later),

    Aura of Courage, Purple Dragon Whirlwind (extra attack when killing blow)

    Alignment: LG, LN, NG

    Notes: Cormyrean military prestige class. Focuses on battlefield leadership.


    ### Red Wizard of Thay

    Requirements: Wizard 5; Region (Thay) or must join Thay; Spellcraft 7 ranks; Wizard
    specialist;

    cannot be barred from using tattoos; must shave head

    HD: d4 | BAB: ½ | Good save: Will

    Key features: Specialist Defense (specialist bonus to saves), Spell Power (+1
    caster level per 2 levels),

    Bonus Feat (item creation/metamagic), Scribe Tattoo (magical tattoos as magic
    items),

    Enhanced Specialization, Wizard Spell Power (bonus spell slot per specialist level)

    Alignment: Any nongood

    Notes: Most powerful arcane caster PrC in FR. Requires significant backstory investment.

    Red Wizards trade magic items via enclaves throughout Faerûn — a major economic
    power.


    ### Shadow Adept

    Requirements: Any metamagic feat; Knowledge (arcana) 8 ranks; ability to cast
    4th-level spells

    HD: d4 | BAB: ½ | Good save: Will

    Key features: Shadow Weave Magic (using Shar''s Shadow Weave instead of Mystra''s),
    Spellcasting +1/level,

    Tendrils of Darkness (free obscuring mist), Shadow Double (mirror image 1/day),
    Spell Power +1

    Benefits: +1 caster level for Enchantment, Illusion, and Darkness spells

    Penalties: −2 caster level for Divination; −2 caster level for Evocation and Transmutation;

    cannot use Divination spells from the Weave at all

    Alignment: Usually NE or LE (Shar worshippers)

    Notes: Shadow Weave users cannot learn Divination beyond 1st level. This is a
    significant trade-off.


    ### Spellfire Channeler

    Requirements: Spellfire power (extremely rare — usually born with it), Concentration
    8 ranks

    Notes: Spellfire is the ability to absorb magical energy and release it as destructive
    fire.

    Extremely rare. Most famous wielder: Shandril Shessair.


    ---'
  champions_of_valor___valor-aligned_prcs: '### Acolyte of the Skin (evil)

    Requirements: Chaotic evil; Concentration 8 ranks; ability to cast 3rd-level arcane
    spells

    Key features: Demon grafted to skin; gains natural armor, claws, and eventually
    fiendish traits.


    ### Bladesinger (Elven)

    Requirements: Elf or half-elf; Weapon Focus (any sword); Spellcraft 8 ranks; arcane
    spellcaster

    HD: d8 | BAB: ¾ | Good saves: Ref, Will

    Key features: Bladesong Style (when in style: +2 AC, +10 speed, arcane spell failure
    reduced 15%),

    Spell Power +1/2 levels, spellcasting +1/level, Extra Bladesong Style uses

    Notes: Elven warrior-mage tradition. Common among Tel''Quessir.


    ### Fist of Eilistraee

    Requirements: Good drow; Eilistraee worship; BAB +5; bardic music or Turn Undead

    Key features: Song of the Eilistraee (expanded bardic music), Moonfire (radiant
    damage to evil),

    Divine Spellcasting (1st–4th level cleric spells), Moonblade training


    ### Holy Liberator

    Requirements: Good alignment; BAB +4; lay on hands (paladin feature)

    Key features: Inspire Freedom (counter fear + charm), Smite Evil, spellcasting
    (1st–3rd level)


    ### Initiate of Eilistraee / Ilmater / etc.

    Many specific deity initiate PrCs exist in various books. General format:

    Requirements: Worshipping that deity; Knowledge (religion) 6+ ranks; various

    Key features: Access to extra domain spells, special divine abilities tied to
    deity''s portfolio


    ### Knight of the Weave (Champion of Mystra)

    Requirements: Arcane spellcaster; Knowledge (arcana) 10 ranks; Good alignment

    Key features: Weave Sense, spellcasting +1/level, antimagic protection, Weave
    Channeling


    ---'
  races_of_faerûn_prcs: '### Demonbinder

    Requirements: Chaotic evil; Knowledge (the planes) 6 ranks; ability to cast 2nd-level
    arcane

    Key features: Bind Demon (compel demons without using spell slots), Demonic Familiar,
    Infernal Resilience


    ### Drow Judicator (Evil)

    Requirements: Drow; BAB +6; worship Lolth

    Key features: Spider Climb, Poison use +, special drow combat styles


    ### Gnome Artificer

    Requirements: Gnome; Craft (any) 8 ranks; Craft Wondrous Item feat

    Key features: Create Minor Artifacts, Imbue Item (create magic items as sorcerer
    ignoring class requirements)


    ### Ruathar (Elven Friend)

    Requirements: Non-elf; befriended an elven noble house; Knowledge (nature) 4 ranks

    Key features: Elven weapon training, low-light vision, Elven Blood (treated as
    elf for effects)


    ### Shield Dwarf Defender

    Requirements: Shield dwarf; Fighter 4; Toughness feat

    Key features: Improved Damage Reduction, Dwarven Battleskill (+2 attack vs. giants
    and orcs)


    ---'
  unapproachable_east_prcs: '### Hathran (Rashemi Witch)

    Requirements: Female human; Rashemen origin; ability to cast 3rd-level arcane
    and 1st-level divine;

    must be a member of the Wychlaran (Hathran society)

    HD: d6 | BAB: ½ | Good saves: Fort, Ref, Will (unusual)

    Key features: Cohort of the Land (spirit companion), Circle (join spellcasting
    circles with other

    Hathrans for vastly increased power), Special Arcane Ability (bonus power per
    level),

    Spellcasting +1/level (both arcane and divine)

    Notes: Unique dual-progression caster (advances BOTH wizard and cleric caster
    levels simultaneously).

    Extremely powerful for gestalt-style builds. Must remain in Rashemen or powers
    are weakened.


    ### Runescarred Berserker

    Requirements: Rashemi barbarian; BAB +6; 5 runes (magical tattoos) already scarred

    Key features: Runic Power (each rune grants a spell-like ability, 1/day), Rage
    enhancement,

    Improved Uncanny Dodge


    ### Taer (Rashemi Warrior)

    Requirements: Rashemen male; BAB +5; Cannot use arcane magic

    Key features: Taer''s Rage (enhanced barbarian rage), Two-weapon style training


    ### Mage Hunter (Theskian)

    Requirements: BAB +4; Spellcraft 6 ranks (to identify spells to counter); no arcane
    spellcasting

    Key features: Dispel (as dispel magic 1/day per level), Spell Resistance (growing
    from 10 to 20+)


    ---'
  shining_south_prcs: '### Forest Master

    Requirements: Druid 5 or Ranger 5; Knowledge (nature) 8 ranks; Halruaan or Chultan
    origin

    Key features: Wild Shape advances, Summon Nature''s Ally +2 effective druid level


    ### Ghost-Faced Killer (Assassin variant)

    Requirements: Chaotic or evil; Hide 8 ranks; Move Silently 8 ranks; sneak attack
    +4d6

    Key features: Frightful attack (target must save or become shaken), Death Attack,
    Sneak Attack


    ### Morninglord of Lathander

    Requirements: Cleric of Lathander; Knowledge (religion) 8 ranks; BAB +4

    Key features: Sunbolt (ranged divine attack), Restoration 1/day, Undead Revulsion
    (turn bonus)


    ### Wavemistress / Sailor of Umberlee

    Requirements: Worship Umberlee; BAB +4; Swim 6 ranks

    Key features: Water Breathing, Stormcall (call a storm 1/day), Drown (grapple
    → drowning)


    ---'
  other_notable_prcs: '### Shou Disciple (Kara-Tur cultural link)

    Requires: Far East / Shou origin; Improved Unarmed Strike; multiple martial feats

    Key features: Ki pool (as monk), specific eastern martial art style


    ### Dweomerkeeper (divine magic specialist)

    Requires: Knowledge (arcana) 10 ranks; cleric 5; ability to cast 4th-level divine

    Key features: Spontaneous Domain Spells, Alter Spell (apply one metamagic free
    per day)


    ### Loremaster (SRD, but common in FR)

    Requirements: Knowledge (any two) 10 ranks; ability to cast 7th-level spells

    Key features: Secrets (one bonus feat or ability per level), Lore (combined bardic+wizard
    knowledge check)


    ### Archmage (SRD, used in FR)

    Requirements: Arcane caster; ability to cast 7th-level arcane; 4 metamagic feats;
    Spellcraft 15

    Key features: High Arcana abilities (Arcane Fire, Arcane Reach, Mastery of Counterspelling,

    Mastery of Elements, Mastery of Shaping, Spell Power, Spell-Like Ability)

    Notes: Elminster-level PrC for NPC archmages.


    ---'
  initiate_feats_(deity-specific,_frcs): 'Rather than PrCs, many deities grant **Initiate
    Feats** to qualifying clergy:


    | Deity | Initiate Feat Benefit |

    |---|---|

    | Cyric | +1 caster level for Enchantment/Illusion; can Rebuke undead as LE cleric
    |

    | Eilistraee | Sword dancing bonus; +1d6 sacred damage with longswords |

    | Gond | Craft magic items at 75% cost; +2 Craft checks |

    | Helm | +2 AC bonus when guarding another; free Combat Reflexes |

    | Kelemvor | Detect Undead at will; Turn Undead +2 levels |

    | Lathander | +2 hit points per level; free Empower Spell for healing |

    | Mielikki | Speak with Animals 3/day; +2 Handle Animal |

    | Mystra | Arcane Insight (+2 Spellcraft/Knowledge [arcana]); detect magic at
    will |

    | Oghma | 3 extra skill points per level; bardic knowledge if not bard |

    | Selûne | Low-light vision; +2 Navigation and Survival |

    | Shar | Shadow Walk 1/day; Blind-Fight free feat |

    | Silvanus | Wild Shape 1/day (as druid 5); +2 to nature-related skill |

    | Torm | +2 sacred bonus on saves when protecting someone; Turn Undead bonus |

    | Tempus | +1 attack when fighting alongside allies; Weapon Focus (deity''s weapon)
    |

    | Tymora | +2 luck on one check per day; reroll one die per day |'
