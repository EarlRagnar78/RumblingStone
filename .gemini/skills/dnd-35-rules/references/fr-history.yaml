sections:
  overview: '# Forgotten Realms — History & Timeline (D&D 3.5)


    Sources: FRCS (2001), Lost Empires of Faerûn (2005), Player''s Guide to Faerûn
    (2004),

    The Grand History of the Realms (2007)


    Timeline uses Dale Reckoning (DR). Current date: 1372 DR (3.5 campaign baseline).


    ---'
  the_ages_of_faerûn: '### Before the Reckoning (Prehistory)


    **The Dawn Ages (−30,000 DR to −24,000 DR)**

    The world of Toril is young. Ao creates the gods; the gods shape the world. The
    first peoples —

    elves, dwarves, dragons — awaken. The Creator Races (batrachi, aearee, sarrukh,
    faerun) predate

    elves and humans and created the yuan-ti, lizardfolk, and various serpent races.


    **The Sarrukh Empires (−34,000 DR)**

    The Sarrukh (a Creator Race) build Isstosseffr, Ss''thar''toss''ss, and Okothmagos
    — the serpent

    empires. They create the yuan-ti, naga, lizardfolk, and related serpentine races
    through magical

    experimentation. These empires eventually collapse through internal conflict and
    overreach.


    **The Age of Dragons (−24,000 to −12,000 DR)**

    Dragonkind dominates. The Draco Holy Wars (Dragonfall War). Bahamut and Tiamat''s
    children clash

    repeatedly. The elves begin to rise.


    **The First Flowering of the Elves (−12,000 to −9,000 DR)**

    The elven nations rise. The Crown Wars (a series of devastating elven civil wars
    −12,000 to −9,000 DR)

    shatter elven unity and lead to the drow being driven underground by Corellon''s
    curse.


    ---'
  human_empires_and_the_rise_of_civilization: "### The Netherese Empire (−3,859 DR\
    \ to −339 DR)\n\nNetheril was a human empire of unprecedented magical power, located\
    \ where the Anauroch desert\nnow lies. The Netherese discovered the Nether Scrolls\
    \ (created by the Sarrukh) and used them to\ndevelop High Magic.\n\nKey events:\n\
    - **−3,859 DR**: Founding of Netheril; early city-states develop\n- **−2,954 DR**:\
    \ Netherese discover the Nether Scrolls; explosive magical development begins\n\
    - High Netheril period: Netherese archwizards create flying cities (mythallar-powered)\n\
    - **−3 DR (approx)**: Karsus attempts to steal godhood by casting the 12th-level\
    \ spell Karsus's Avatar.\n  He briefly replaces Mystryl (original Mystra). The\
    \ system overloads; Mystryl dies; all magic fails.\n  Most flying cities crash;\
    \ the empire collapses. The phaerimm beneath Anauroch begin draining\n  the land.\
    \ One city, Shade Enclave, flees to the Shadowfell and survives.\n  \nThe Fall\
    \ of Netheril directly creates the Anauroch Desert and scatters the Netherese\
    \ survivors\nwho become the Halruaans, Bedine, and various other cultures.\n\n\
    ### The Calishite Empire (−7,000 DR to present day)\n\nCalimshan is the oldest\
    \ continuously extant empire in Faerûn, though it has gone through many\nforms.\
    \ The original Calishite Shoon Imperium existed as a powerful slave empire. Djinn\
    \ ruled\nportions of it for centuries. Now (1372 DR) it persists as a weakened\
    \ remnant of past glory,\nstill the largest city in Faerûn (Calimport) but politically\
    \ fragmented.\n\n### The Kingdom of Cormyr (~276 DR onwards)\n\nFounded by Ondeth\
    \ Obarskyr and the Wyvernwater charter. House Obarskyr has ruled unbroken.\nThe\
    \ Forest Country has maintained stability unusual for Faerûn. Azoun IV (1307–1371\
    \ DR) was one\nof its most capable kings; his death against the Tuigan Horde (1360\
    \ DR battle) and again in 1371 DR\n(against the Dracorage) has left the throne\
    \ to his infant son.\n\n---"
  the_dale_reckoning_calendar: 'Dale Reckoning (DR) begins at year 1 DR = the year
    Dalereckoning was adopted by the Dalelands.

    Named for the Dale folk''s compact with the Cormanthor elves.


    ### Key Historical Events (Selected)


    | Year DR | Event |

    |---|---|

    | 1 | Establishment of Dale Reckoning; the Dalelands compact with the Elven Court
    |

    | 261 | Fall of the kingdom of Anauria (Netherese survivor state) |

    | 276 | Cormyr founded by House Obarskyr |

    | 394 | Netherese survivor states established (proto-Halruaa, proto-Mulhorand)
    |

    | 661 | The Fall of Myth Drannor; the Weeping War; demons overwhelm the elven
    city |

    | 714 | The Standing Stone erected; formal beginning of current Dalelands political
    structure |

    | 880 | The Night Masks (thieves'' guild) rise in Westgate |

    | 900 | Sammaster founds the Cult of the Dragon |

    | 922 | Thay formally established as a nation by Red Wizard rebels against Mulhorand
    |

    | 1018 | The Harpers formally organized |

    | 1235 | The Great Crusade; Shoon Imperium collapses |

    | 1248 | The Arcane Brotherhood established at Luskan |

    | 1261 | Zhentarim founded by Manshoon and Fzoul Chembryl |

    | 1300s | Expansion of major cities; rise of merchant princes |

    | 1344 | The Tuigan Horde (Yamun Khahan) invades from the East; Faerûn mobilizes
    |

    | 1360 | The Battle of the Golden Way; Azoun IV defeats the Tuigan Horde |

    | 1358 | THE TIME OF TROUBLES (see below) |

    | 1369 | Retreat of the Red Wizards from the Dalelands after a failed invasion
    |

    | 1369 | Waukeen returns from imprisonment |

    | 1370 | Khelben Arunsun breaks from the Harpers; forms the Moonstars |

    | 1371 | King Azoun IV of Cormyr dies fighting the Dracorage |

    | 1372 | **CURRENT DATE (D&D 3.5 baseline)** — see "State of the Realms" below
    |


    ---'
  the_time_of_troubles_(1358_dr): 'Also called the "Godswar" or "Avatar Crisis." The
    most significant event in the last 100 years.


    **Cause**: The Tablets of Fate (divine decree-stones) were stolen from Ao by Bane
    and Myrkul.

    Ao responded by casting all the gods from the planes and forcing them to walk
    the world as avatars.


    **Events**:

    - Gods walked Faerûn as powerful but vulnerable avatars (mortal weapons could
    wound them)

    - Regions of dead magic and wild magic appeared (gods'' conflicts disrupted the
    Weave)

    - Bane and Torm fought in Tantras; both died

    - Bhaal was killed by Cyric (then a mortal thief)

    - Myrkul was destroyed by Midnight (a mortal scholar of magic)

    - The Tablets were eventually recovered

    - Midnight ascended to become the new Mystra (Mystra II)

    - Kelemvor (the thief Cyric had traveled with) eventually became the new god of
    death

    - Cyric ascended as a chaotic evil god of murder and deception


    **Aftermath**:

    - Bane''s son Iyachtu Xvim held the portfolio of fear temporarily (until Bane''s
    return in 1372)

    - Major holy sites were disrupted

    - Many worshippers lost faith and converted to other religions

    - The divine hierarchy reshuffled significantly


    ---'
  the_state_of_the_realms_(1372_dr_—_campaign_start_point): '### Active Threats and
    Tensions


    **The Shade Enclave (Returned Shadovar)**

    The flying city of Shade Enclave, which fled into the Plane of Shadow during Karsus''s
    Folly,

    has returned. The Netherese mage-lords of Shade are establishing control over
    the Anauroch and

    pursuing ancient Netherese artifacts. They are clearly setting up for a major
    power play.

    Shadow Weave use is increasing; Shar''s influence growing.


    **The Return of Bane (1372 DR)**

    Bane has returned through his son Iyachtu Xvim. Fzoul Chembryl led this ritual.

    The Zhentarim are energized. Banite clergy are aggressive and expanding.


    **Thay''s Enclave Strategy**

    Red Wizard enclaves are appearing in major cities across Faerûn. The cheap magic
    items

    are gaining economic dependency. Szass Tam is planning something larger than anyone
    realizes.


    **The Dracorage**

    A magical phenomenon linked to the King-Killer Star (a comet) that drives dragons
    into a frenzy.

    King Azoun IV of Cormyr died fighting one of these frenzied dragons (1371 DR).

    The Dracorage has ended but its effects linger.


    **Myth Drannor''s Reclamation**

    The Army of Darkness that plagued Myth Drannor for centuries was defeated. Elves
    have

    begun reclaiming the ruined city. An elven military presence is growing there.


    **The Drow and the War of the Spider Queen**

    A goddess silence — Lolth going quiet — has thrown drow society into chaos (the
    War of the

    Spider Queen novel series, starting 1372 DR). This is a major plot point for Underdark
    campaigns.


    ---'
  ancient_empires_(lost_empires_of_faerûn): '### Myth Drannor (Cormanthyr)

    The greatest elven city ever built in Faerûn. A multiracial experiment (humans,
    halflings, dwarves

    welcomed alongside elves). Fell in 714 DR during the Weeping War when demons overran
    it.

    Ruins remain in the Cormanthor Forest. FULL of powerful artifacts, demons, and
    undead.

    Being slowly reclaimed as of 1372 DR.


    ### The Imaskari Empire (−10,000 to −1,000 DR)

    Powerful wizarding empire in the East (under modern Mulhorand). Created magical
    portals to other

    worlds and imported humans as slaves (ancestors of the Mulan). Eventually overthrown.


    ### Illefarn (−17,600 to −1,100 DR)

    Ancient elven empire covering what is now the Sword Coast North. Capital was Aelinthaldaar

    (buried under Waterdeep). Left the Forgotten Realms when the elves departed for
    Evermeet.


    ### Eaerlann (−4,500 to −882 DR)

    Elven realm in the High Forest. Alliances with dwarves of Ammarindar. Destroyed
    by tanar''ri

    released from Hellgate Keep.


    ### Shanatar (−8,500 to −1,288 DR)

    Ancient dwarven empire below what is now Calimshan and the Sword Coast. Ruled
    by the eight

    clans of the deepstone dwarves. Collapsed from internal conflict and sarrukh interference.


    ### The Arcorar (Myth Drannor''s predecessor)

    The elven realm before Myth Drannor; lasted thousands of years; gradually became
    the more

    open experiment of Cormanthyr.


    ---'
  the_calendar_of_harptos_(expanded): '**12 months × 30 days = 360 days + 5 special
    "intercalary" days + 1 leap day every 4 years**


    | Month | Name | Season |

    |---|---|---|

    | 1 | Hammer (Deepwinter) | Winter |

    | — | Midwinter (festival day) | Winter |

    | 2 | Alturiak (The Claws of Winter) | Winter |

    | 3 | Ches (The Claws of the Sunsets) | Late Winter |

    | 4 | Tarsakh (The Claws of Storms) | Spring |

    | — | Greengrass (festival day) | Spring |

    | 5 | Mirtul (The Melting) | Spring |

    | 6 | Kythorn (The Time of Flowers) | Summer |

    | 7 | Flamerule (Summertide) | Summer |

    | — | Shieldmeet (once every 4 years only) | Summer |

    | 8 | Eleasis (Highsun) | Late Summer |

    | 9 | Eleint (The Fading) | Autumn |

    | — | Highharvestide (festival day) | Autumn |

    | 10 | Marpenoth (Leaffall) | Autumn |

    | 11 | Uktar (The Rotting) | Late Autumn |

    | — | Feast of the Moon (festival day) | Late Autumn |

    | 12 | Nightal (The Drawing Down) | Winter |


    **Week equivalent**: The tenday (10 days) is used instead of a 7-day week.

    **Day names**: Named after their position in the tenday (1st, 2nd... 10th), not
    by name.


    **Major Festival Days**:

    - **Midwinter**: Politics and planning; nobles exchange gifts; prophecy season

    - **Greengrass**: First day of spring; outdoor celebrations; offerings to nature
    gods

    - **Midsummer** (not a festival day per se but Flamerule is midsummer-heavy):
    Longest day

    - **Shieldmeet**: Leap day (every 4 years); oaths, diplomatic treaties, marriages
    of state

    - **Highharvestide**: Harvest celebration; thanksgiving to agricultural gods

    - **Feast of the Moon**: Honoring the dead; grave-tending; Selûne is central


    ---'
  notable_chronicles_and_lore_books_(in-world): 'These exist as in-world texts that
    player characters might find or study:


    - **The Grand History of the Realms** — comprehensive history compiled by Augathra
    the Mad

    - **Volo''s Guide to...** (series) — Volo (Volothamp Geddarm) writes popular travel
    guides; unreliable

    - **Elminster''s Ecologies** — Elminster''s notebooks on Faerûnian creatures and
    environments

    - **Candlekeep Chronicles** — Various histories maintained at Candlekeep (the
    great library)

    - **The Nether Scrolls** — Legendary 100-scroll set of Netherese magic; scattered
    and lost

    - **The Tablets of Fate** — Ao''s divine law-stones; now restored and secured
    by Ao

    - **The Cyrinishad** — The holy book of Cyric; reading it drives you insane (or
    converts you)'
