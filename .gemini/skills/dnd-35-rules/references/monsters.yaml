  templates: '**Half-Dragon**: +2 STR, +2 INT/CHA; gain energy immunity; breath weapon;
    NA +4; LA +3

    **Half-Fiend**: +4 STR/CON, +2 INT/WIS/CHA; SR 11+HD; DR 5/magic; spell-like abilities;
    wings; LA +4

    **Half-Celestial**: +4 STR/CON, +2 INT/WIS/CHA; SR 11+HD; DR 5/magic; spell-like
    abilities; wings; LA +4

    **Vampire**: Undead type; +6 STR, +2 DEX, +4 INT/WIS/CHA; +8 NA; energy drain;
    blood drain; dominate; mist form; weaknesses (sunlight, running water, stake);
    LA +8

    **Lich**: Undead type; +2 INT/WIS/CHA; touch paralysis; phylactery; CR +2; LA
    +4

    **Skeleton**: Undead; lose all; gain DR 5/bludgeoning; darkvision 60 ft; CR varies

    **Zombie**: Undead; lose all; gain DR 5/slashing; single damage type; CR varies


    **Adding a template**: Apply stat changes, gain/lose abilities, recalculate CR.


    ---'
  encounter_distance_(surprise_rules): '| Terrain | Encounter Distance |

    |---|---|

    | Dungeon | 2d6 × 5 ft |

    | Scrubland / forest (thick) | 2d8 × 10 ft |

    | Open plains | 6d6 × 10 ft |

    | Jungle | 2d4 × 5 ft |

    | Underground cavern | 3d6 × 10 ft |

    | Desert | 6d6 × 10 ft |


    Perception (Listen/Spot) vs. Stealth (Hide/Move Silently) determines surprise.'
