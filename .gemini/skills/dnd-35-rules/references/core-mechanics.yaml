    | Tumble | DEX | Yes | Yes |

    | Use Magic Device | CHA | Yes | No |

    | Use Rope | DEX | No | No |


    *Double ACP for Swim


    ---'
  feats:_key_categories: '**Fighter Bonus Feats** (subset): Combat Expertise, Dodge,
    Great Cleave, Improved Critical, Power Attack, Spring Attack, Weapon Finesse,
    Weapon Focus, Weapon Specialization…


    **Metamagic Feats**: Empower Spell (+2 levels), Enlarge Spell (+1), Extend Spell
    (+1), Heighten Spell (variable), Maximize Spell (+3), Quicken Spell (+4), Silent
    Spell (+1), Still Spell (+1)


    **Item Creation Feats**: Brew Potion (CL 3+), Craft Magic Arms/Armor (CL 5+),
    Craft Rod (CL 9+), Craft Staff (CL 12+), Craft Wand (CL 5+), Craft Wondrous Item
    (CL 3+), Forge Ring (CL 12+), Scribe Scroll (CL 1+)


    ---'
  ability_score_increases: '**Every 4 character levels** (4th, 8th, 12th, 16th, 20th):
    +1 to any one ability score

    **Permanent ability damage** (ability drain): Requires restoration or greater
    restoration

    **Temporary ability damage**: Heals at 1 point per full rest per ability per day


    ---'
