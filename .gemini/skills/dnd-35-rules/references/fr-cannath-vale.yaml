  geographic_notes_for_dm_use: '### Position in Faerûn


    Cannath Vale sits in the region known as **Channath Vale / Lhespenar** in the
    FRCS and

    Shining South sourcebooks — south of the Shining Plains, north of the Shaar proper.

    The vale is bounded by The Wyrmbones (west), Rathgaunt Hills (NE), The North Wall
    (south).


    ### The Shaar


    Appears on both the NW and NE edges of the map. The vale effectively sits as a
    settled

    pocket within the broader Shaar grassland belt. The **Shaar River** drains north
    out of

    the map; the **Talar River** drains south into the Bandit Wastes.


    ### Kormul — Important


    Kormul is labeled on the map as a square (significant settlement) west of Skull
    Gorge,

    in the foothills of The Wyrmbones near the Dwarfroad. It does not appear in the
    original

    RHoD module text — it comes from the FR map''s pre-existing Khormul location.
    The DM

    should decide: is Kormul abandoned ruins (as in FR history), a struggling frontier
    town,

    or an active settlement? Its position on the Dwarfroad makes it a natural waystation.


    ### The Swagdar and Brown Hills


    These appear on the eastern and southeastern edge of the map respectively. Both
    are FR

    canonical region names from the Shining South era. The Swagdar is a dry, sparsely

    populated region east of Cannathgate. Brown Hills are foothills of The North Wall.


    ### Shaarcah Forest — Spelling


    The map clearly spells this **Shaarcah** (not "Shaareach" or "Shaareach Forest").

    This is the forest in the center of the vale; the Tiri Kitor elves live here in
    RHoD.

    In this Cannath Vale adaptation, they are Sy''Tel''Quessir (wild elves) worshipping

    Rillifane Rallathil.


    ### The Witchstream


    Flows through Shaarcah Forest east-to-west. The village of Witchcross sits at
    its ford.


    ---'
  weather_in_cannath_vale: 'Live weather tool: <https://www.realmshelps.net/faerun/weather.shtml>

    Use **Dalelands** or **Shining South** region as proxy.


    Campaign season (Flamerule/Eleasis, 1372 DR):


    - Temperature: 22–32°C by day; fog in Lhespenbog mornings (Spot +4 DC until midmorning)

    - Wyrmbones weather: Afternoon storms 30% chance; thunder heard nightly from that
    range

    - Shaar winds: Hot, dry southeastern winds; dust in the Bandit Wastes

    - The North Wall: Cold even in summer; Hammerfist Holds have snow year-round above
    3,000 ft


