    | **The Shaar** | Open plains | The Endless Plains | Appears NW *and* NE of the
    vale |

    | **The Misty Vale** | Forest | The Westdeep | Far west; extremely xenophobic
    elves |

    | **The Wyrmbones** | Mountain range | Wyrmsmoke Mountains | West; Red Hand horde
    origin |

    | **Lhespenbog** | Swamp | The Blackfens | Central-north; Lhesper ruins within
    |

    | **Shaarcah Forest** | Forest | The Witchwood | Center; Tiri Kitor territory
    — spell: **Shaarcah** not "Shaareach" |

    | **Cannathwood** | Forest | Marth Forest | East |

    | **Rathgaunt Hills** | Hills | Giantshield Mountains | Far northeast; giant clans
    |

    | **Bandit Wastes** | Badlands | The Thornwaste | South-center; Ghostlord''s domain
    |

    | **The Swagdar** | Region | *(no RHoD equivalent)* | Far east; FR canonical region
    name |

    | **Brown Hills** | Hills | *(no RHoD equivalent)* | Southeast; FR addition |

    | **The North Wall** | Mountain range | Wyvernwatch Mountains | South — **NOT**
    "North Hills"; Hammerfist Holds within |


    ### Water Features


    | Name on Map | Type | = RHoD Equivalent | Notes |

    |---|---|---|---|

    | **Lake Lhespen** | Lake | Lake Rhestin | Central-north; large blue lake |

    | **Shaar River** | River | *(no RHoD named equiv.)* | Northern river; flows NE
    off map |

    | **Talar River** | River | Elsir River (west branch) | West; flows south — **"Talar
    River"** not "River Talar" |

    | **The Lhescreek** | Creek | Skull Gorge stream | Central; flows south from lake
    toward Skull Gorge |

    | **The Witchstream** | Stream | Witchstream | Through Shaarcah Forest |

    | **Cannath River** | River | Elsir River (east branch) | Center-east; labeled
    east of Rethmar |

    | **Lhesper Trail** | Trail | *(unnamed in RHoD)* | Northeast of lake; track to
    Lhesper ruins |


    ### Roads


