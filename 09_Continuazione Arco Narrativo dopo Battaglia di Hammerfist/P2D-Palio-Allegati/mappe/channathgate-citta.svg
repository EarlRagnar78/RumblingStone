<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 640" width="760" height="640" role="img" aria-label="Channathgate — pianta della città e degli otto rioni delle contrade">
  <rect width="760" height="640" fill="#e7ddc7"/>
  <text x="380" y="28" font-family="Georgia,serif" font-size="21" text-anchor="middle" font-weight="bold" fill="#3a2f22">CHANNATHGATE — Città-Porto sul Fiume Cannath</text>
  <text x="380" y="46" font-family="Georgia,serif" font-size="12" text-anchor="middle" fill="#6b5a3a">~35 miglia a est di Rethmar · gli 8 rioni delle contrade · edifici colorati per rione</text>

  <!-- acqua esterna / fiume in basso -->
  <path d="M0 520 q190 -34 380 -14 q190 20 380 -22 V640 H0 Z" fill="#3a91bd"/>
  <path d="M0 520 q190 -34 380 -14 q190 20 380 -22" fill="none" stroke="#1f6f8a" stroke-width="3"/>
  <g stroke="#cfe9f4" stroke-width="2" fill="none" opacity="0.7"><path d="M60 560 q20 -8 40 0"/><path d="M180 566 q20 -8 40 0"/><path d="M520 556 q20 -8 40 0"/><path d="M640 548 q20 -8 40 0"/></g>
  <text x="120" y="600" font-family="Georgia,serif" font-size="14" fill="#eef6fb" font-style="italic">Fiume Cannath ▸ scende a Rethmar (SO)</text>

  <!-- mura -->
  <path d="M80 90 H680 Q706 90 706 116 V470 Q706 496 680 496 H80 Q54 496 54 470 V116 Q54 90 80 90 Z" fill="none" stroke="#6b5a44" stroke-width="8"/>
  <!-- torri -->
  <g fill="#6b5a44"><rect x="46" y="82" width="16" height="16"/><rect x="698" y="82" width="16" height="16"/><rect x="46" y="488" width="16" height="16"/><rect x="698" y="488" width="16" height="16"/><rect x="370" y="82" width="16" height="16"/></g>
  <!-- porte -->
  <rect x="360" y="84" width="40" height="12" fill="#c9a267" stroke="#5a4326" stroke-width="1.5"/><text x="380" y="78" font-family="Georgia,serif" font-size="10" text-anchor="middle" fill="#3a2f22">Porta dell'Alba (Dawn Way ▸ Rethmar)</text>
  <rect x="48" y="280" width="12" height="40" fill="#c9a267" stroke="#5a4326" stroke-width="1.5"/><text x="30" y="276" font-family="Georgia,serif" font-size="10" fill="#3a2f22">Porta di Terra</text>
  <rect x="360" y="490" width="40" height="12" fill="#c9a267" stroke="#5a4326" stroke-width="1.5"/><text x="470" y="512" font-family="Georgia,serif" font-size="10" text-anchor="middle" fill="#1f6f8a">Porta del Porto</text>

  <!-- strade principali (griglia irregolare) -->
  <g stroke="#d8c9a6" stroke-width="12" stroke-linecap="round">
    <line x1="380" y1="96" x2="380" y2="496"/>            <!-- cardo -->
    <line x1="60" y1="300" x2="700" y2="300"/>            <!-- decumano -->
    <line x1="200" y1="96" x2="200" y2="496"/>
    <line x1="560" y1="96" x2="560" y2="496"/>
    <line x1="60" y1="190" x2="700" y2="190"/>
    <line x1="60" y1="410" x2="700" y2="410"/>
  </g>

  <!-- helper: isolati = gruppi di casette colorate per contrada -->
  <!-- OCA (verde) NO -->
  <g fill="#1f7a44" stroke="#0f3a22" stroke-width="1">
    <rect x="96" y="112" width="90" height="66" rx="3"/><rect x="214" y="112" width="150" height="30" rx="2"/>
    <rect x="214" y="150" width="70" height="28" rx="2"/>
  </g>
  <text x="150" y="150" font-family="Georgia,serif" font-size="13" fill="#fff" font-weight="bold" text-anchor="middle">OCA</text>
  <text x="150" y="165" font-family="Georgia,serif" font-size="8.5" fill="#e9ffe9" text-anchor="middle">banchieri/nobili</text>

  <!-- TORRE (amaranto) NE -->
  <g fill="#8a1f2b" stroke="#3a0d12" stroke-width="1">
    <rect x="574" y="112" width="118" height="66" rx="3"/><rect x="396" y="112" width="150" height="30" rx="2"/><rect x="476" y="150" width="70" height="28" rx="2"/>
  </g>
  <text x="632" y="150" font-family="Georgia,serif" font-size="13" fill="#fff" font-weight="bold" text-anchor="middle">TORRE</text>
  <text x="632" y="165" font-family="Georgia,serif" font-size="8.5" fill="#ffe1e4" text-anchor="middle">veterani/fabbri</text>

  <!-- UNICORNO (azzurro/arancio) O -->
  <g fill="#2a6fb0" stroke="#12324f" stroke-width="1">
    <rect x="96" y="204" width="90" height="70" rx="3"/><rect x="214" y="204" width="150" height="30" rx="2"/><rect x="214" y="242" width="90" height="32" rx="2"/>
  </g>
  <text x="150" y="242" font-family="Georgia,serif" font-size="12" fill="#fff" font-weight="bold" text-anchor="middle">UNICORNO</text>
  <text x="150" y="257" font-family="Georgia,serif" font-size="8.5" fill="#e6f0ff" text-anchor="middle">artigiani/gilde</text>

  <!-- DRAGO (rosa/verde) E -->
  <g fill="#8a2f5f" stroke="#4a1533" stroke-width="1">
    <rect x="574" y="204" width="118" height="70" rx="3"/><rect x="396" y="204" width="150" height="30" rx="2"/><rect x="456" y="242" width="90" height="32" rx="2"/>
  </g>
  <text x="632" y="242" font-family="Georgia,serif" font-size="13" fill="#fff" font-weight="bold" text-anchor="middle">DRAGO</text>
  <text x="632" y="257" font-family="Georgia,serif" font-size="8.5" fill="#ffe6f2" text-anchor="middle">accademia arcana</text>

  <!-- PIAZZA centrale -->
  <ellipse cx="380" cy="300" rx="82" ry="60" fill="#c9a267" stroke="#5a4326" stroke-width="3"/>
  <ellipse cx="380" cy="300" rx="54" ry="38" fill="#d9cba8" stroke="#8a7448" stroke-width="1.5"/>
  <text x="380" y="296" font-family="Georgia,serif" font-size="12" text-anchor="middle" font-weight="bold" fill="#3a2f22">PIAZZA DEL GUADO</text>
  <text x="380" y="311" font-family="Georgia,serif" font-size="9" text-anchor="middle" fill="#6b5a3a">la pista del Palio</text>
  <rect x="352" y="266" width="56" height="12" fill="#0d1b2a"/><text x="380" y="276" font-family="Georgia,serif" font-size="7.5" fill="#e9c24a" text-anchor="middle">Palazzo Gonfaloniere</text>

  <!-- BRUCO (giallo) SO -->
  <g fill="#b8a80f" stroke="#5a5206" stroke-width="1">
    <rect x="96" y="330" width="90" height="70" rx="3"/><rect x="214" y="336" width="120" height="28" rx="2"/><rect x="214" y="372" width="80" height="28" rx="2"/>
  </g>
  <text x="150" y="368" font-family="Georgia,serif" font-size="13" fill="#2a2600" font-weight="bold" text-anchor="middle">BRUCO</text>
  <text x="150" y="383" font-family="Georgia,serif" font-size="8.5" fill="#3a3400" text-anchor="middle">mercato nero</text>

  <!-- CIVETTA (nero/rosso) SE -->
  <g fill="#1a1a1a" stroke="#000" stroke-width="1">
    <rect x="574" y="330" width="118" height="70" rx="3"/><rect x="452" y="336" width="120" height="28" rx="2"/><rect x="486" y="372" width="86" height="28" rx="2"/>
  </g>
  <text x="632" y="368" font-family="Georgia,serif" font-size="12" fill="#c9a227" font-weight="bold" text-anchor="middle">CIVETTA</text>
  <text x="632" y="383" font-family="Georgia,serif" font-size="8.5" fill="#e8dfc7" text-anchor="middle">nobiltà decaduta</text>

  <!-- ISTRICE (marrone) sobborghi S (dentro le mura, fascia bassa) -->
  <g fill="#6b4a1f" stroke="#3a2610" stroke-width="1">
    <rect x="214" y="424" width="150" height="56" rx="3"/><rect x="120" y="430" width="80" height="26" rx="2"/>
  </g>
  <text x="290" y="450" font-family="Georgia,serif" font-size="12" fill="#fff" font-weight="bold" text-anchor="middle">ISTRICE</text>
  <text x="290" y="465" font-family="Georgia,serif" font-size="8.5" fill="#f0e2cf" text-anchor="middle">profughi/baraccopoli</text>

  <!-- ONDA (celeste) al porto SE basso -->
  <g fill="#1f6f8a" stroke="#0d3a4a" stroke-width="1">
    <rect x="396" y="424" width="176" height="56" rx="3"/>
  </g>
  <text x="484" y="450" font-family="Georgia,serif" font-size="12" fill="#fff" font-weight="bold" text-anchor="middle">ONDA</text>
  <text x="484" y="465" font-family="Georgia,serif" font-size="8.5" fill="#dff2fb" text-anchor="middle">barcaioli/portuali</text>

  <!-- moli e darsena fuori porta del porto -->
  <g fill="#0d3a4a"><rect x="360" y="506" width="10" height="26"/><rect x="392" y="506" width="10" height="30"/><rect x="424" y="506" width="10" height="24"/></g>
  <rect x="470" y="516" width="120" height="34" rx="4" fill="#0d3a4a"/><text x="530" y="537" font-family="Georgia,serif" font-size="11" fill="#bfe6f5" text-anchor="middle">DARSENA / FLOTTA</text>
  <text x="530" y="562" font-family="Georgia,serif" font-size="9" fill="#0d3a4a" text-anchor="middle">(qui si imbarca la Marea Montante… e le statue di contrabbando)</text>

  <!-- legenda -->
  <g font-family="Georgia,serif" font-size="10.5" fill="#3a2f22">
    <text x="30" y="622" font-weight="bold">Note:</text>
    <text x="72" y="622">le case colorate = rioni delle 8 contrade · la Piazza del Guado ospita la corsa · la Darsena dell'Onda è lo snodo del traffico di statue (drow, Giorno 2)</text>
  </g>
</svg>
