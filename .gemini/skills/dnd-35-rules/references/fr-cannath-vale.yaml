  underdark_access_&_deep_locations: "The RumblingStone campaign includes extensive\
    \ Underdark content beneath Hammerfist Holds.\nThese locations are accessed from\
    \ **The North Wall** mountains (Hammerfist area).\n\n### Dungeon Chain (Sequential,\
    \ Arcs 01–07)\n\nThe party descended through these locations in order, connected\
    \ by passages and portals:\n\n```\n[Hammerfist Holds (Surface)]\n        ↓\n[Minotaur\
    \ Lair — Pre-Arc 01, unnumbered]\n  └── First Underdark area below Hammerfist\n\
    \  └── Maur (Underdark native, CR ~10, defeated)\n  └── Il Collezionista (Rakshasa\
    \ + basilisk, ESCAPED)\n  └── Cristal Warriors (from Underdark p.93)\n  └── Adapted\
    \ from Expedition to Undermountain (p.165) and Underdark sourcebook\n        ↓\n\
    [01_LaMiniera — Ancient Mine]\n  └── Grell Necromancer lair, Grell Patriarch\n\
    \  └── Cristal Warriors also encountered in early mine rooms\n        ↓\n[02_scaladossa-abbattor-funghi\
    \ — Neverlight Grove (Adapted)]\n  └── Fungi Tower (2+ levels): drow-modified\
    \ myconid research lab\n  └── Web spider infestations, drow aberration researchers\n\
    \  └── Demonweb Pits creatures (Expedition to the Demonweb Pits p.67)\n  └── Connection\
    \ to Sonjak's drow faction (undiscovered by party)\n  └── Portal to deeper levels\
    \ (used by escaping drow)\n        ↓\n[03_la Cittadella — Abandoned Citadel]\n\
    \  └── Moradin Temple with Undead Beholder\n  └── Runic frescoes (Corona di Adamantio\
    \ clues)\n        ↓\n[04_tomba_di_Belkram — Belkram's Tomb]\n  └── Adapted from\
    \ Expedition to Undermountain, Belkram's Fall\n  └── Xorn encounters, Gelatinous\
    \ Cube, gargoyle turrets\n  └── Illithid worm encounter → Artemis cerebromorphosis\
    \ crisis\n  └── Ring of Chaotic Illumination first major activation\n        ↓\n\
    [05_aa-stanza-runica — Runic Room]\n  └── Puzzle room with ancient dwarven runes\n\
    \        ↓\n[06_Stanza-corona-di-adamantio — Crown Chamber]\n  └── Boss battle\
    \ for the Corona di Adamantio\n  └── Hella Oakenshield dies here\n  └── Party\
    \ opens portal to Eternal Forge\n        ↓\n[07_il Portale Della Forgia Eterna\
    \ — Eternal Forge Portal]\n  └── Sala della Forgia Eterna (hub room)\n  └── Altare\
    \ del Cuore di Moradin (Cuore Moradin artifact)\n  └── Portal to Fire Plane (Part\
    \ 3)\n  └── Portal to Earth Plane (Part 4)\n  └── Temporal Portal (Part 5, requires\
    \ 2+ gems)\n  └── Hella Resurrection Ritual (Part 3B)\n```\n\n### The Eternal\
    \ Forge — Planar Geography\n\n**Sala della Forgia Eterna (Hub)**\nCentral chamber\
    \ in deep Underdark. Contains the Altare del Cuore di Moradin — an ancient\nmithral\
    \ altar hiding the Cuore di Moradin (Heart of Moradin) artifact inside a perfectly\n\
    concealed reliquary. This room connects to elemental planes via portals.\n\n**Fire\
    \ Plane Node (Part 3)**\nAccessed via fire portal from Sala. Standard Fire Plane\
    \ environmental rules apply.\nContains:\n\n- Elemental fire combats\n- Rituale\
    \ Gemma del Tempo → activates Corona's Topaz gem\n- Location where Tordek found\
    \ Bracieri Gemelli di Moradin (Fire Phase)\n- Location where party found NPC Therysol\n\
    \n**Earth Plane Node (Part 4)**\nAccessed via earth portal from Sala. Features:\n\
    \n- Forest of Living Crystal (current party location)\n- Mithral Golem encounter\
    \ (Tordek's Earth trial)\n- Rituale Gemma Terra → activates Corona's Emerald gem\n\
    - Tordek's Bracieri Earth awakening completion\n\n**Temporal Void (Part 5)**\n\
    Requires Topaz + Emerald gems activated. Opens portal to **Year -1000 DR**.\n\
    Party travels to ancient Hammerfist to fight in a historical battle.\nRuby gem\
    \ activates at dawn during this temporal battle.\n\n### Neverlight Grove Adaptation\
    \ Notes\n\nThe Neverlight Grove content is adapted from **Out of the Abyss** (D&D\
    \ 5e) converted to 3.5:\n- The giant mushroom tower and its crazed inhabitants\
    \ are retained\n- The drow experiments replace the 5e demon influence with **Lolth-sanctioned\
    \ fleshcrafting**\n- Creatures from **Expedition to the Demonweb Pits** (p.67)\
    \ are used by the drow researchers\n- Sonjak (Drow Matrona) and her researchers\
    \ occupy the upper levels\n- Il Collezionista (Rakshasa) operated from the minotaur\
    \ lair area nearby (Pre-Arc 01)\n- Portal in the fungi tower connects to the deeper\
    \ citadel levels\n\n### Key Underdark Villains\n\n| Villain | Race/Type | CR |\
    \ Status | Location |\n|---|---|---|---|---|\n| Grell Patriarch | Aberration |\
    \ ~8 | Defeated | 01_LaMiniera |\n| Il Collezionista | Rakshasa | ~12 | **ESCAPED**\
    \ | Unknown — allied with drow, provides evil artifacts (Pre-01) |\n| Maur | Underdark\
    \ native | ~10 | Defeated | Minotaur Lair (Pre-Arc 01) |\n| Cristal Warriors |\
    \ Construct/Elemental | ~7 | Defeated | Minotaur Lair + 01_LaMiniera (from *Underdark*\
    \ p.93) |\n| Sonjak | Drow Cleric Matrona | ~14 | Active | Underdark/Surface ops\
    \ |\n| Undead Beholder | Undead | ~13 | Defeated | 03_la Cittadella |\n| Zalkatar\
    \ | Illithid Warlock Drow | 13 | Active | Invisible Tower (Arc 09-P2A) |"
