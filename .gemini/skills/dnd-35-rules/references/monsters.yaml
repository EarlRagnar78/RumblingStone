  common_monster_special_abilities: '**Darkvision**: See in total darkness up to stated
    range (B&W).

    **Low-light vision**: See 2× as far as humans in dim light.

    **Scent**: Detect creatures by smell (30 ft; 60 ft downwind; 15 ft upwind); pinpoints
    within 5 ft.

    **Tremorsense**: Detect vibrations in contact with ground up to N ft.

    **Blindsight**: Perceive surroundings without vision up to N ft.


    **Damage Reduction (DR N/type)**: Reduce damage by N unless weapon has bypass
    type (magic, silver, cold iron, adamantine, alignment, etc.)

    **Spell Resistance (SR N)**: Attacker must beat d20+caster level vs. SR to affect
    with spell.

    **Energy Resistance N (type)**: Reduce that energy type damage by N per attack.

    **Energy Immunity**: Completely immune to that energy type.

    **Fast Healing N**: Regain N HP per round automatically (does not work if dead
    or at 0).

    **Regeneration N**: As fast healing but also regrows lost limbs; certain damage
    (often fire/acid) deals lethal even to this creature.


    **Poison**: Two saves required (Fort); initial and secondary effect (usually 1
    min apart).

    **Disease**: Fort save or contract; incubation period then recurring damage.

    **Paralysis**: Fort save or paralyzed for duration.

    **Petrification**: Fort save or turned to stone.

    **Swallow Whole**: Melee attack; grapple check; swallowed take crushing+acid each
    round; can cut free from inside.


