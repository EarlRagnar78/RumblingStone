sections:
  overview: '# Core Mechanics — D&D 3.5 SRD Reference


    Source: d20srd.org/srd/theBasics.htm and related pages


    ---'
  the_d20_roll: '**Attack roll:** d20 + BAB + STR mod (melee) or DEX mod (ranged)
    + size modifier + misc

    **Skill check:** d20 + skill ranks + ability mod + misc

    **Saving throw:** d20 + base save + ability mod + magic bonuses + misc

    **Ability check:** d20 + ability modifier (no ranks added)


    **Natural 20:** Always hits (attack) / always succeeds (skill, threat of crit
    on attack)

    **Natural 1:** Always misses (attack) / auto-fails (save)

    Note: Natural 1/20 do NOT auto-fail/succeed skill checks in RAW 3.5.


    ---'
  armor_class: '**AC = 10 + armor bonus + shield bonus + DEX mod + size mod + natural
    armor + deflection + dodge + misc**


    | AC Component | Applies vs. touch? | Applies flat-footed? |

    |---|---|---|

    | Armor bonus | No | Yes |

    | Shield bonus | No | Yes |

    | DEX modifier | No | No |

    | Natural armor | No | Yes |

    | Deflection | Yes | Yes |

    | Dodge | Yes | No |

    | Insight / Sacred / Profane | Yes | Varies |


    **Touch AC** = 10 + DEX + deflection + dodge + size (no armor/shield/natural)

    **Flat-footed AC** = 10 + armor + shield + natural + deflection + size (no DEX/dodge)


    ---'
  size_modifiers: '| Size | AC/Attack mod | Grapple mod | Hide mod |

    |---|---|---|---|

    | Fine | +8 | −16 | +16 |

    | Diminutive | +4 | −12 | +12 |

    | Tiny | +2 | −8 | +8 |

    | Small | +1 | −4 | +4 |

